name: amlgraph-ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run Maven tests
        run: mvn -B -ntp -f services/pom.xml test

  frontend:
    name: Frontend tests and build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Run frontend tests
        run: pnpm test

      - name: Build frontend
        run: pnpm build
        env:
          VITE_API_BASE_URL: http://localhost:8080/api

  ai:
    name: AI service tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/ai-service

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install AI service dependencies
        run: pip install -r requirements.txt

      - name: Run AI tests
        env:
          PYTHONPATH: ${{ github.workspace }}/services/ai-service
        run: python -m pytest

  docker:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend, ai]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: gateway
            context: .
            dockerfile: services/gateway/Dockerfile

          - name: transaction-service
            context: .
            dockerfile: services/transaction-service/Dockerfile

          - name: rule-engine-service
            context: .
            dockerfile: services/rule-engine-service/Dockerfile

          - name: alert-service
            context: .
            dockerfile: services/alert-service/Dockerfile

          - name: customer-service
            context: .
            dockerfile: services/customer-service/Dockerfile

          - name: graph-service
            context: .
            dockerfile: services/graph-service/Dockerfile

          - name: frontend
            context: .
            dockerfile: frontend/Dockerfile

          - name: ai-service
            context: services/ai-service
            dockerfile: services/ai-service/Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set lowercase GHCR owner
        id: ghcr
        shell: bash
        run: |
          echo "owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.image.context }}
          file: ${{ matrix.image.dockerfile }}
          push: true
          tags: ghcr.io/${{ steps.ghcr.outputs.owner }}/amlgraph-${{ matrix.image.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  vercel:
    name: Deploy frontend to Vercel
    runs-on: ubuntu-latest
    needs: frontend

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    defaults:
      run:
        working-directory: frontend

    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Vercel secrets
        id: vercel-secrets
        shell: bash
        run: |
          if [ -z "$VERCEL_TOKEN" ] || [ -z "$VERCEL_ORG_ID" ] || [ -z "$VERCEL_PROJECT_ID" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are missing. Skipping Vercel deployment."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
            echo "Vercel secrets are configured."
          fi

      - name: Enable pnpm
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Set up Node.js 20
        if: steps.vercel-secrets.outputs.configured == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install frontend dependencies
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm install --no-frozen-lockfile

      - name: Pull Vercel environment
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm dlx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel project
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm dlx vercel@latest build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel project
        if: steps.vercel-secrets.outputs.configured == 'true'
        run: pnpm dlx vercel@latest deploy --prebuilt --prod --token="$VERCEL_TOKEN"