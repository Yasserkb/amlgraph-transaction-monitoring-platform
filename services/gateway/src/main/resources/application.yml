server:
  port: ${SERVER_PORT:8080}

amlgraph:
  security:
    enabled: ${AMLGRAPH_SECURITY_ENABLED:false}

spring:
  application:
    name: amlgraph-gateway
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: transaction-service
          uri: ${TRANSACTION_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/transactions/**
        - id: alert-service-alerts
          uri: ${ALERT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/alerts/**
        - id: alert-service-cases
          uri: ${ALERT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/cases/**
        - id: customer-service
          uri: ${CUSTOMER_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/customers/**
        - id: graph-service
          uri: ${GRAPH_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/graph/**
        - id: ai-service
          uri: ${AI_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/ai/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
