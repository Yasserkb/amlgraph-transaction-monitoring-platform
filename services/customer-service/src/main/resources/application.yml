server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: customer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/amlgraph}
    username: ${SPRING_DATASOURCE_USERNAME:amlgraph}
    password: ${SPRING_DATASOURCE_PASSWORD:amlgraph}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: customers
        format_sql: true
  flyway:
    enabled: true
    schemas: customers
    create-schemas: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    consumer:
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
