server:
  port: ${SERVER_PORT:8081}

spring:
  application:
    name: transaction-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/amlgraph}
    username: ${SPRING_DATASOURCE_USERNAME:amlgraph}
    password: ${SPRING_DATASOURCE_PASSWORD:amlgraph}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: transactions
        format_sql: true
  flyway:
    enabled: true
    schemas: transactions
    create-schemas: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:29092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
